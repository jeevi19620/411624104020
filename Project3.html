<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messaging App</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f7f7f5;--card:#fff;--border:#e5e5e3;--text:#111;--sub:#666;--muted:#aaa;--accent:#378add;--accent-bg:#e6f1fb;--success:#3b6d11;--success-bg:#eaf3de;--warn:#854f0b;--warn-bg:#faeeda;--danger:#a32d2d;--danger-bg:#fcebeb;--input-bg:#f7f7f5}
    [data-dark]{--bg:#1a1a18;--card:#242422;--border:#333;--text:#f0efe8;--sub:#999;--muted:#555;--accent:#5ba3e8;--accent-bg:#0c2a40;--success:#97c459;--success-bg:#1a2e0a;--warn:#ef9f27;--warn-bg:#2e1f04;--danger:#e24b4a;--danger-bg:#2e0c0c;--input-bg:#1e1e1c}
    body{font-family:Arial,sans-serif;background:var(--bg);min-height:100vh;padding:1.5rem;transition:background 0.2s;color:var(--text)}
    .app{max-width:540px;margin:0 auto}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
    .topbar h1{font-size:20px;font-weight:600;color:var(--text)}
    .theme-btn{height:32px;padding:0 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:12px;cursor:pointer}
    .theme-btn:hover{border-color:var(--accent);color:var(--accent)}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-align:center}
    .stat-num{font-size:20px;font-weight:600;color:var(--accent)}
    .stat-label{font-size:11px;color:var(--muted);margin-top:2px}
    .input-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:1rem}
    .input-row{display:flex;gap:8px;margin-bottom:10px}
    #msginput{flex:1;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;padding:0 12px;outline:none}
    #msginput:focus{border-color:var(--accent)}
    #msgbtn{height:38px;padding:0 16px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer}
    #msgbtn:hover{opacity:0.85}
    .bar-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .bar-wrap{flex:1}
    .bar-label{font-size:11px;color:var(--muted);margin-bottom:3px}
    .bar-bg{height:4px;border-radius:2px;background:var(--border);overflow:hidden}
    .bar-fill{height:4px;border-radius:2px;background:var(--accent);width:0%;transition:width 0.1s,background 0.2s}
    .bar-fill.warn{background:var(--warn)}
    .bar-fill.full{background:var(--danger)}
    #clrbtn{height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:12px;cursor:pointer}
    #clrbtn:hover{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
    #status{font-size:12px;margin-top:8px;min-height:16px;color:var(--muted)}
    #status.ok{color:var(--success)}
    #status.err{color:var(--danger)}
    .msg-list{display:flex;flex-direction:column;gap:8px}
    .empty{text-align:center;padding:2.5rem 0;color:var(--muted);font-size:13px}
    .msg-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;display:flex;align-items:flex-start;gap:10px;animation:slidein 0.18s ease}
    @keyframes slidein{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
    .msg-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .msg-body{flex:1;min-width:0}
    .msg-text{font-size:14px;color:var(--text);word-break:break-word;line-height:1.5}
    .msg-text input{border:none;border-bottom:1px solid var(--accent);background:transparent;color:var(--text);font-size:14px;width:100%;outline:none}
    .msg-meta{font-size:11px;color:var(--muted);margin-top:3px}
    .msg-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .act-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .act-btn:hover.edit{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}
    .act-btn:hover.del{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
    .timer-pill{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
    .timer-pill.g{background:var(--success-bg);color:var(--success)}
    .timer-pill.a{background:var(--warn-bg);color:var(--warn)}
    .timer-pill.r{background:var(--danger-bg);color:var(--danger)}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>&#128172; Messages</h1>
    <button class="theme-btn" id="themeBtn">&#9788; Light</button>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="sSent">0</div><div class="stat-label">Sent</div></div>
    <div class="stat"><div class="stat-num" id="sActive">0</div><div class="stat-label">Active</div></div>
    <div class="stat"><div class="stat-num" id="sExpired">0</div><div class="stat-label">Expired</div></div>
  </div>
  <div class="input-card">
    <div class="input-row">
      <input type="text" id="msginput" maxlength="10" placeholder="Type a message…" autocomplete="off">
      <button id="msgbtn">&#10148; Send</button>
    </div>
    <div class="bar-row">
      <div class="bar-wrap">
        <div class="bar-label" id="chcount">0 / 10 chars</div>
        <div class="bar-bg"><div class="bar-fill" id="charbar"></div></div>
      </div>
      <button id="clrbtn">&#128465; Clear all</button>
    </div>
    <div id="status"></div>
  </div>
  <div class="msg-list" id="msgarea">
    <div class="empty" id="emptyEl">&#128236;<br>No messages yet</div>
  </div>
</div>

<script>
  const input=document.getElementById("msginput"),chcount=document.getElementById("chcount"),charbar=document.getElementById("charbar"),msgbtn=document.getElementById("msgbtn"),clrbtn=document.getElementById("clrbtn"),msgarea=document.getElementById("msgarea"),statusEl=document.getElementById("status"),emptyEl=document.getElementById("emptyEl"),themeBtn=document.getElementById("themeBtn"),sSent=document.getElementById("sSent"),sActive=document.getElementById("sActive"),sExpired=document.getElementById("sExpired");
  let sent=0,active=0,expired=0,dark=false;

  function updateStats(){sSent.textContent=sent;sActive.textContent=active;sExpired.textContent=expired}
  function setStatus(t,c){statusEl.textContent=t;statusEl.className=c||""}
  function updateBar(n){chcount.textContent=n+" / 10 chars";charbar.style.width=(n/10*100)+"%";charbar.className="bar-fill"+(n>=10?" full":n>=7?" warn":"")}

  themeBtn.addEventListener("click",()=>{
    dark=!dark;
    dark?document.documentElement.setAttribute("data-dark","1"):document.documentElement.removeAttribute("data-dark");
    themeBtn.innerHTML=dark?"&#9790; Dark":"&#9788; Light";
  });

  function playBeep(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type="sine";o.frequency.setValueAtTime(880,ctx.currentTime);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
      o.start();o.stop(ctx.currentTime+0.25);
    }catch(e){}
  }

  input.addEventListener("input",()=>updateBar(input.value.length));
  input.addEventListener("keydown",e=>{if(e.key==="Enter")msgbtn.click()});

  function checkEmpty(){if(!msgarea.querySelector(".msg-card"))emptyEl.style.display=""}

  function addCard(text){
    emptyEl.style.display="none";
    const card=document.createElement("div");card.className="msg-card";
    const initials=text.substring(0,2).toUpperCase();
    const now=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    card.innerHTML=`<div class="msg-avatar">${initials}</div>
    <div class="msg-body">
      <div class="msg-text">${text}</div>
      <div class="msg-meta">Sent at ${now} &middot; expires in <span class="cd">10</span>s</div>
    </div>
    <div class="msg-actions">
      <button class="act-btn edit" title="Edit">&#9998;</button>
      <button class="act-btn del" title="Delete">&#128465;</button>
      <span class="timer-pill g">10s</span>
    </div>`;
    msgarea.appendChild(card);

    const pill=card.querySelector(".timer-pill"),cd=card.querySelector(".cd"),mt=card.querySelector(".msg-text");
    const editBtn=card.querySelector(".act-btn.edit"),delBtn=card.querySelector(".act-btn.del");
    let secs=10,editing=false;

    editBtn.addEventListener("click",()=>{
      if(!editing){
        editing=true;
        const cur=mt.textContent;
        mt.innerHTML=`<input maxlength="10" value="${cur}">`;
        mt.querySelector("input").focus();
        editBtn.innerHTML="&#10003;";
      } else {
        const val=mt.querySelector("input").value.trim();
        if(val.length>=3){mt.textContent=val;editing=false;editBtn.innerHTML="&#9998;";setStatus("Updated!","ok");}
        else setStatus("Min 3 characters!","err");
      }
    });

    delBtn.addEventListener("click",()=>{
      card.style.transition="opacity 0.2s,transform 0.2s";
      card.style.opacity="0";card.style.transform="translateX(20px)";
      setTimeout(()=>{card.remove();active--;expired++;updateStats();checkEmpty()},200);
    });

    const iv=setInterval(()=>{
      secs--;pill.textContent=secs+"s";cd.textContent=secs;
      if(secs<=3)pill.className="timer-pill r";
      else if(secs<=6)pill.className="timer-pill a";
      if(secs<=0)clearInterval(iv);
    },1000);

    setTimeout(()=>{
      clearInterval(iv);
      card.style.transition="opacity 0.3s,transform 0.3s";
      card.style.opacity="0";card.style.transform="translateX(16px)";
      setTimeout(()=>{card.remove();active--;expired++;updateStats();checkEmpty();setStatus("A message expired.","")},300);
    },10000);
  }

  msgbtn.addEventListener("click",()=>{
    const val=input.value.trim();
    new Promise((res,rej)=>{val.length>=3?res(val):rej(val.length===0?"Type something first.":"Min 3 characters needed.");})
    .then(msg=>{sent++;active++;updateStats();addCard(msg);playBeep();setStatus("Sent!","ok");input.value="";updateBar(0);})
    .catch(e=>setStatus(e,"err"));
  });

  clrbtn.addEventListener("click",()=>{
    msgarea.querySelectorAll(".msg-card").forEach(c=>c.remove());
    expired+=active;active=0;updateStats();
    emptyEl.style.display="";input.value="";updateBar(0);setStatus("Cleared.","");
  });
</script>
</body>
</html>
